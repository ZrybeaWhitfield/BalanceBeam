name: Configure Branch Protection

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/branch-protection.yml"

permissions:
  contents: read

jobs:
  protect-main:
    runs-on: ubuntu-latest

    steps:
      - name: Protect main branch
        uses: actions/github-script@v7
        with:
          # ADMIN_PAT must be a Fine-Grained or Classic PAT with repo admin
          # access (Administration: write) stored as a repository secret.
          github-token: ${{ secrets.ADMIN_PAT }}
          script: |
            await github.rest.repos.updateBranchProtection({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: 'main',
              required_status_checks: {
                strict: true,
                checks: [
                  { context: 'backend-ci / backend' }
                ]
              },
              // enforce_admins: false lets repository admins push directly,
              // satisfying the requirement that "only you / admins" can push.
              enforce_admins: false,
              required_pull_request_reviews: {
                dismiss_stale_reviews: false,
                require_code_owner_reviews: false,
                required_approving_review_count: 1
              },
              restrictions: null,
              allow_force_pushes: false,
              allow_deletions: false
            });
            console.log('Branch protection for main has been configured.');
